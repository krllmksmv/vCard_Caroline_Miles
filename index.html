<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Contact Card</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #0f172a;
      --accent-2: #111827;
      --shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.95), rgba(244,246,248,0.92) 35%, rgba(240,243,247,1) 100%);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px 40px;
    }

    .phone {
      width: 100%;
      max-width: 430px;
    }

    .hero {
      background: linear-gradient(180deg, #ffffff 0%, #f7f8fa 100%);
      border-radius: 32px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.9);
    }

    .hero__image {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #dfe6ee;
    }

    .hero__content {
      padding: 22px 22px 24px;
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 1.8rem;
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: -4px 0 18px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: transform 0.18s ease, opacity 0.18s ease;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .sections {
      margin-top: 16px;
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(15, 23, 42, 0.05);
    }

    .card__title {
      margin: 0 0 14px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent-2);
    }

    .item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }

    .item:first-of-type { border-top: 0; padding-top: 0; }
    .item:last-of-type { padding-bottom: 0; }

    .icon {
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: #f3f4f6;
      color: #111827;
      font-size: 1.05rem;
    }

    .label {
      margin: 0 0 4px;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .value {
      margin: 0;
      font-size: 0.98rem;
      line-height: 1.45;
      color: var(--text);
    }

    .value a {
      color: inherit;
      text-decoration: none;
    }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (min-width: 700px) {
      .page { padding-top: 40px; }
      .hero__content { padding: 28px 28px 30px; }
      .card { padding: 22px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="phone">
      <section class="hero">
        <img
          class="hero__image"
          src="https://static.myqrcode.mobi/user-media-prod/2026-03-18-16.48.21_3dad02c4_xq3r3v"
          alt="Profile photo"
        />
        <div class="hero__content">
          <h1>Caroline Miles</h1>
          <p class="subtitle">Digital contact card</p>
          <a class="btn" href="#contact">
            <span>＋</span>
            <span>Add contact</span>
          </a>
        </div>
      </section>

      <div class="sections">
        <section class="card" id="contact">
          <h2 class="card__title">Contact</h2>

          <div class="item">
            <div class="icon">✉️</div>
            <div>
              <p class="label">Email</p>
              <p class="value"><a href="mailto:caroline@example.com">caroline@example.com</a></p>
            </div>
          </div>

          <div class="item">
            <div class="icon">📞</div>
            <div>
              <p class="label">Phone</p>
              <p class="value"><a href="tel:+10000000000">+1 (000) 000-0000</a></p>
            </div>
          </div>

          <div class="item">
            <div class="icon">🌐</div>
            <div>
              <p class="label">Website</p>
              <p class="value"><a href="#">example.com</a></p>
            </div>
          </div>
        </section>

        <section class="card">
          <h2 class="card__title">Company</h2>

          <div class="item">
            <div class="icon">🏢</div>
            <div>
              <p class="label">Company</p>
              <p class="value">Company name</p>
            </div>
          </div>

          <div class="item">
            <div class="icon">💼</div>
            <div>
              <p class="label">Position</p>
              <p class="value">Business Development Manager</p>
            </div>
          </div>

          <div class="item">
            <div class="icon">📍</div>
            <div>
              <p class="label">Location</p>
              <p class="value">New York, USA</p>
            </div>
          </div>
        </section>
      </div>

      <p class="footer-note">Single-file demo page in <code>index.html</code></p>
    </div>
  </main>
</body>
</html>
