<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Визитка Иванова</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; max-width: 300px; }
        img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; }
        h1 { margin: 15px 0 5px; font-size: 22px; }
        p { color: #666; margin-bottom: 20px; }
        .btn { display: block; background: #007bff; color: white; text-decoration: none; padding: 12px; border-radius: 8px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <img src="photo.jpg" alt="Мое фото">
        <h1>Иван Иванов</h1>
        <p>Маркетолог / Дизайнер</p>
        <a href="contact.vcf" class="btn">Добавить в контакты</a>
        <a href="https://t.me" class="btn" style="background:#2481cc;">Написать в Telegram</a>
    </div>
</body>
</html>
